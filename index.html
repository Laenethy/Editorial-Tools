<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Editorial Tools — Content Dashboard</title>
<meta name="theme-color" content="#6D28D9" />
<meta name="description" content="Editorial Tools — 180-Day Content Dashboard for Authorlify, Edithority & Editorial Check." />

<!-- PWA manifest -->
<link rel="manifest" href="/manifest.json" />

<!-- Favicons -->
<link rel="icon" type="image/x-icon" href="/favicon.ico" />
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

<!-- Apple / iOS home-screen -->
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png" />
<link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Editorial Tools" />

<!-- Android / Chrome -->
<meta name="mobile-web-app-capable" content="yes" />
<meta name="application-name" content="Editorial Tools" />

<!-- Windows tile -->
<meta name="msapplication-TileColor" content="#6D28D9" />
<meta name="msapplication-TileImage" content="/icon-144.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --purple: #6D28D9;
    --purple-deep: #5b21b6;
    --purple-light: #7c3aed;
    --purple-soft: #ede9fe;
    --purple-softer: #f5f3ff;
    --ink: #1f1b2e;
    --ink-2: #3b3456;
    --muted: #6b6380;
    --paper: #ffffff;
    --bg: #fafaf9;
    --line: #ececec;
    --line-2: #dcdcdc;
    --good: #16a34a;
    --good-bg: #dcfce7;

    --app-authorlify: #7c3aed;
    --app-edithority: #db2777;
    --app-check: #059669;

    --radius: 8px;
    --radius-lg: 14px;
    --shadow-sm: 0 1px 2px rgba(20,17,28,.06);
    --shadow: 0 4px 12px -4px rgba(20,17,28,.1);
    --shadow-lg: 0 20px 40px -15px rgba(109,40,217,.2);
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
  }
  button{ font-family: inherit; }

  /* =============== LOGIN =============== */
  .login-screen{
    min-height: 100vh;
    background: linear-gradient(135deg, var(--purple) 0%, var(--purple-light) 100%);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding: 40px 20px;
    color: white;
  }
  .login-logo{
    width: 80px; height: 80px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 20px;
    display:flex; align-items:center; justify-content:center;
    margin-bottom: 28px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 24px -8px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.15);
  }
  .login-logo svg{ display:block; }
  .login-title{
    font-size: 38px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0 0 10px;
    text-align:center;
  }
  .login-sub{
    color: rgba(255,255,255,0.85);
    font-size: 15px;
    margin: 0 0 40px;
    text-align:center;
  }
  .login-card{
    background: white;
    color: var(--ink);
    padding: 36px 36px 32px;
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 420px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.3);
  }
  .login-card h2{
    margin: 0 0 6px;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .login-card p{
    margin: 0 0 22px;
    color: var(--muted);
    font-size: 14px;
  }
  .login-label{
    display:block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--ink);
  }
  .login-input-wrap{
    position: relative;
  }
  .login-input{
    width: 100%;
    padding: 13px 44px 13px 14px;
    font-size: 15px;
    font-family: inherit;
    border: 1.5px solid var(--line-2);
    border-radius: var(--radius);
    background: white;
    color: var(--ink);
    transition: border-color .15s;
  }
  .login-input:focus{
    outline: none;
    border-color: var(--purple);
  }
  .login-toggle{
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: 0;
    color: var(--muted);
    cursor: pointer;
    padding: 6px;
    border-radius: 4px;
    display:flex; align-items:center; justify-content:center;
  }
  .login-toggle:hover{ color: var(--ink); }
  .login-submit{
    width: 100%;
    padding: 14px;
    margin-top: 18px;
    background: var(--purple);
    color: white;
    border: 0;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, transform .05s;
  }
  .login-submit:hover{ background: var(--purple-light); }
  .login-submit:active{ transform: scale(0.99); }
  .login-error{
    margin-top: 14px;
    color: #dc2626;
    font-size: 13px;
    text-align:center;
    min-height: 18px;
  }
  .login-footer{
    margin-top: 30px;
    color: rgba(255,255,255,0.8);
    font-size: 13px;
    text-align:center;
  }

  /* =============== APP =============== */
  .app{ display:none; }
  .app.visible{ display:block; }

  .masthead{
    background: linear-gradient(135deg, var(--purple) 0%, var(--purple-light) 100%);
    color: white;
    padding: 18px 40px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 24px;
    box-shadow: 0 2px 8px rgba(20,17,28,0.05);
  }
  .masthead-left{display:flex; align-items:center; gap: 14px;}
  .masthead-logo{
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 11px;
    display:flex; align-items:center; justify-content:center;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
  }
  .masthead-logo svg{ display:block; }
  .masthead-titles h1{
    margin: 0;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }
  .masthead-titles .sub{
    font-size: 12.5px;
    color: rgba(255,255,255,0.82);
    font-weight: 500;
    margin-top: 2px;
  }
  .masthead-right{
    display:flex;
    align-items:center;
    gap: 18px;
  }
  .progress-widget{
    display:flex;
    align-items:center;
    gap: 12px;
    padding: 8px 14px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
  }
  .progress-bar{
    width: 100px; height: 6px;
    background: rgba(255,255,255,0.2);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-bar-fill{
    height: 100%;
    background: white;
    width: 0%;
    transition: width .3s;
  }
  .masthead-btn{
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s;
  }
  .masthead-btn:hover{ background: rgba(255,255,255,0.22); }

  .subnav{
    padding: 18px 40px;
    display:flex;
    align-items:center;
    justify-content: space-between;
    gap: 24px;
    border-bottom: 1px solid var(--line);
    background: white;
    position: sticky;
    top: 0;
    z-index: 10;
    flex-wrap: wrap;
  }
  .view-toggle{
    display:inline-flex;
    background: var(--bg);
    padding: 3px;
    border-radius: var(--radius);
    border: 1px solid var(--line);
  }
  .view-toggle button{
    border:0;
    background: transparent;
    padding: 8px 18px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    border-radius: 5px;
    font-weight: 600;
    transition: all .15s;
  }
  .view-toggle button.active{
    background: var(--purple);
    color: white;
  }

  .week-nav{
    display:flex;
    align-items:center;
    gap: 12px;
    font-size: 13.5px;
    color: var(--ink);
    font-weight: 600;
  }
  .week-nav button{
    border: 1px solid var(--line);
    background: white;
    padding: 7px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
    color: var(--ink);
    font-weight: 500;
    transition: all .15s;
  }
  .week-nav button:hover:not(:disabled){ background: var(--purple-softer); border-color: var(--purple-soft); color: var(--purple-deep); }
  .week-nav button:disabled{ opacity: 0.35; cursor: not-allowed; }
  .week-label{
    font-weight: 600;
    min-width: 180px;
    text-align: center;
    color: var(--ink);
  }

  .filter-legend{
    display:flex;
    gap: 16px;
    font-size: 12.5px;
    color: var(--muted);
    font-weight: 500;
  }
  .filter-legend .dot{
    display:inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
    transform: translateY(-1px);
  }

  main{ padding: 28px 40px 80px; }

  /* week view */
  .week-grid{
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 14px;
  }
  .day-card{
    background: white;
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 18px 16px 16px;
    min-height: 240px;
    position: relative;
    display:flex;
    flex-direction:column;
    gap: 10px;
    cursor: pointer;
    transition: all .18s ease;
    overflow: hidden;
  }
  .day-card:hover{
    border-color: var(--purple-soft);
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
  }
  .day-card.rest{
    background: var(--bg);
    cursor: default;
    border-style: dashed;
  }
  .day-card.rest:hover{ transform: none; box-shadow: none; border-color: var(--line); }
  .day-card.today{
    border-color: var(--purple);
    box-shadow: 0 0 0 2px var(--purple-soft), var(--shadow);
  }
  .day-card::before{
    content:'';
    position:absolute; top:0; left:0; right:0; height: 4px;
    background: var(--line-2);
  }
  .day-card.rest::before{ background: transparent; }
  .day-card[data-app="authorlify"]::before{ background: var(--app-authorlify); }
  .day-card[data-app="edithority"]::before{ background: var(--app-edithority); }
  .day-card[data-app="editorialcheck"]::before{ background: var(--app-check); }

  .day-header{
    display:flex; justify-content:space-between; align-items:flex-start;
    gap: 10px;
  }
  .day-date{
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  .day-date small{
    display:block;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 6px;
  }
  .day-app-badge{
    font-size: 10.5px;
    font-weight: 600;
    padding: 4px 9px;
    border-radius: 999px;
    color: white;
    white-space: nowrap;
  }
  .day-app-badge[data-app="authorlify"]{ background: var(--app-authorlify); }
  .day-app-badge[data-app="edithority"]{ background: var(--app-edithority); }
  .day-app-badge[data-app="editorialcheck"]{ background: var(--app-check); }

  .day-theme{
    font-size: 14px;
    line-height: 1.4;
    color: var(--ink-2);
    font-weight: 500;
    margin-top: auto;
  }

  .day-status-row{
    display:flex;
    gap: 6px;
    padding-top: 10px;
    border-top: 1px solid var(--line);
  }
  .status-chip{
    flex:1;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap: 4px;
    padding: 6px 0;
    border-radius: 5px;
    background: var(--bg);
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
  }
  .status-chip.done{
    background: var(--good-bg);
    color: var(--good);
  }

  .rest-label{
    display:flex;
    align-items:center;
    justify-content:center;
    flex:1;
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
    opacity: 0.7;
  }

  /* day view */
  .day-view{
    max-width: 900px;
    margin: 0 auto;
  }
  .back-link{
    display:inline-flex;
    align-items:center;
    gap: 6px;
    font-size: 13px;
    color: var(--muted);
    text-decoration: none;
    font-weight: 500;
    margin-bottom: 18px;
    cursor: pointer;
    border: 0;
    background: none;
    padding: 6px 0;
  }
  .back-link:hover{ color: var(--purple-deep); }

  .day-view-header{
    padding-bottom: 24px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 28px;
    display:flex;
    justify-content:space-between;
    align-items: flex-end;
    gap: 24px;
    flex-wrap: wrap;
  }
  .day-view-title{
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: var(--ink);
    margin: 0;
  }
  .day-view-title .app-tag{
    display:inline-block;
    font-size: 14px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 999px;
    color: white;
    margin-left: 10px;
    vertical-align: middle;
  }
  .day-view-meta{
    font-size: 13px;
    color: var(--muted);
    text-align: right;
    line-height: 1.7;
  }
  .day-view-meta strong{
    color: var(--ink);
    font-weight: 600;
  }

  .platform-stack{
    display:flex;
    flex-direction: column;
    gap: 20px;
  }
  .platform-card{
    background: white;
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .platform-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding: 14px 22px;
    border-bottom: 1px solid var(--line);
    background: var(--bg);
  }
  .platform-name{
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--ink);
    display:inline-flex;
    align-items:center;
    gap: 10px;
  }
  .platform-name .letter{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width: 28px; height: 28px;
    background: var(--ink);
    color: white;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 700;
  }
  .platform-char-count{
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }
  .platform-body{
    padding: 22px 24px 20px;
  }
  .post-text{
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink);
    white-space: pre-wrap;
    margin: 0 0 18px;
  }
  .platform-actions{
    display:flex;
    gap: 10px;
    align-items:center;
    flex-wrap: wrap;
  }
  .btn{
    font-size: 13.5px;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: var(--radius);
    border: 1px solid var(--line);
    background: white;
    color: var(--ink);
    cursor: pointer;
    display:inline-flex;
    align-items:center;
    gap: 7px;
    transition: all .15s;
  }
  .btn:hover{ background: var(--purple-softer); border-color: var(--purple-soft); color: var(--purple-deep); }
  .btn.primary{
    background: var(--purple);
    color: white;
    border-color: var(--purple);
  }
  .btn.primary:hover{ background: var(--purple-light); border-color: var(--purple-light); color: white; }
  .btn.status-btn.done{
    background: var(--good-bg);
    border-color: #bbf7d0;
    color: var(--good);
  }
  .btn.status-btn.done:hover{
    background: #bbf7d0;
    color: #166534;
  }
  .btn.copied{
    background: var(--good);
    border-color: var(--good);
    color: white;
  }
  .btn.copied:hover{
    background: var(--good);
    color: white;
  }

  .day-view-footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding-top: 24px;
    margin-top: 28px;
    border-top: 1px solid var(--line);
  }
  .day-view-footer .btn{ min-width: 140px; justify-content:center; }

  .rest-card{
    text-align:center;
    padding: 80px 40px;
    background: white;
    border: 1px dashed var(--line-2);
    border-radius: var(--radius-lg);
  }
  .rest-card h2{
    font-size: 32px;
    font-weight: 700;
    margin: 0 0 10px;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  .rest-card p{
    color: var(--muted);
    margin: 0;
    font-size: 14px;
  }

  @media (max-width: 1100px){
    .week-grid{ grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 820px){
    .masthead{ padding: 16px 20px; flex-direction: column; align-items: flex-start; gap: 14px; }
    .masthead-right{ width: 100%; justify-content: space-between; }
    .subnav{ padding: 14px 20px; gap: 14px; }
    main{ padding: 24px 20px 60px; }
    .week-grid{ grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .day-card{ min-height: 210px; padding: 14px 13px; }
    .day-view-title{ font-size: 26px; }
    .day-view-header{ flex-direction: column; align-items: flex-start; }
    .day-view-meta{ text-align: left; }
    .filter-legend{ flex-wrap: wrap; gap: 10px 16px; }
    .login-title{ font-size: 30px; }
    .login-card{ padding: 28px 24px; }
  }
  @media (max-width: 440px){
    .week-grid{ grid-template-columns: 1fr; }
    .masthead-logo{ width: 40px; height: 40px; }
    .masthead-titles h1{ font-size: 16px; }
  }
</style>
</head>
<body>

<section class="login-screen" id="loginScreen">
  <div class="login-logo">
    <svg viewBox="0 0 512 512" width="44" height="44" aria-hidden="true">
      <path fill="#ffffff" d="M 156.08,121.65 L 355.92,121.65 Q 360.96,121.65 360.96,126.69 L 360.96,164.89 Q 360.96,169.93 355.92,169.93 L 207.72,169.93 L 207.72,233.96 L 276.15,233.96 Q 281.19,233.96 281.19,239.00 L 281.19,273.00 Q 281.19,278.04 276.15,278.04 L 207.72,278.04 L 207.72,342.07 L 355.92,342.07 Q 360.96,342.07 360.96,347.11 L 360.96,385.31 Q 360.96,390.35 355.92,390.35 L 156.08,390.35 Q 151.04,390.35 151.04,385.31 L 151.04,126.69 Q 151.04,121.65 156.08,121.65 Z" />
    </svg>
  </div>
  <h1 class="login-title">Editorial Tools</h1>
  <p class="login-sub">Content Dashboard · Apr–Oct 2026</p>

  <form class="login-card" id="loginForm" autocomplete="off">
    <h2>Sign in</h2>
    <p>Enter your password to access the dashboard.</p>
    <label class="login-label" for="pw">Password</label>
    <div class="login-input-wrap">
      <input class="login-input" type="password" id="pw" placeholder="Enter password" autocomplete="current-password" />
      <button class="login-toggle" type="button" id="pwToggle" aria-label="Show password">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
      </button>
    </div>
    <button class="login-submit" type="submit">Access Dashboard</button>
    <div class="login-error" id="loginError"></div>
  </form>

  <div class="login-footer">Editorial Tools · 180-Day Content Calendar</div>
</section>

<div class="app" id="app">

  <header class="masthead">
    <div class="masthead-left">

udgets allow.\n\n🔗 linktr.ee/EditorialTools\n\n#Journalism #IndependentMedia #Editorial #Publishing #Journalist #NewsroomTools #MediaIndustry #Edithority #EditorialTools"}}, {"date": "2026-05-13", "weekday": "Wednesday", "weekday_short": "Wed", "day_index": 29, "app": "editorialcheck", "app_name": "Editorial Check", "app_icon": "✅", "rest": false, "theme": "Branded PDF export", "posts": {"x": "A well-designed PDF sells your work before the reader reads it.\n\nPress kits. Client reports. Pitch decks. One export, publication-grade.", "threads": "A well-designed PDF sells your work before the reader reads a word.\n\nPress kits. Client reports. Pitch decks. Research briefs. Stakeholder updates.\n\nThe format still matters — maybe more now, in a world of disposable links. A branded, typographically sharp PDF communicates care. Care is the original trust signal.\n\nOne export. Publication-grade. On-brand by default.", "instagram": "A well-designed PDF sells your work before the reader reads a word.\n\n📰 Press kits\n📊 Client reports\n🎯 Pitch decks\n📚 Research briefs\n\nIn a world of disposable links, format still matters — maybe more.\n\nA branded, typographically sharp PDF communicates care. And care is the original trust signal.\n\n🔗 linktr.ee/EditorialTools\n\n#Journalism #Editorial #Publishing #ContentCreation #MediaIndustry #Journalist #EditorialCheck #EditorialTools"}}, {"date": "2026-05-14", "weekday": "Thursday", "weekday_short": "Thu", "day_index": 30, "app": "authorlify", "app_name": "Authorlify", "app_icon": "📖", "rest": false, "theme": "Multi-language reach", "posts": {"x": "Your next reader might not speak English.\n\nTranslating your book is expensive.\nTranslating your marketing isn't.\n\nFive languages of hooks. One click.\n\nThat's how indie competes with Big 5.", "threads": "Your next reader might not speak English.\n\nTranslating your book costs thousands.\nTranslating your marketing shouldn't.\n\nIndie authors who promote in 2-3 languages see 40% broader reach than English-only peers. Not because the book is better — because more readers get the chance to find it.\n\nYour market isn't 'the world.' It's the world that can read your hook.", "instagram": "Your next reader might not speak English.\n\n🌍 Translating your book = thousands of dollars\n⚡ Translating your marketing ≠\n\nIndie authors promoting in 2-3 languages see up to 40% broader reach. Not because the book is better — because more readers can find it.\n\nYour market isn't 'the world.' It's the world that can read your hook.\n\n🔗 linktr.ee/EditorialTools\n\n#IndieAuthor #SelfPublishing #BookMarketing #InternationalAuthors #WritingCommunity #AuthorLife #BookTok #WritersOfInstagram #PublishingTips #Authorlify"}}]}</script>
<script>
(() => {
  const PASSWORD = 'Admin/2022';
  const AUTH_KEY = 'et-auth-v1';
  const STORAGE_KEY = 'et-dashboard-v1';

  function isAuthed(){ return sessionStorage.getItem(AUTH_KEY) === '1'; }
  function setAuthed(v){
    if(v) sessionStorage.setItem(AUTH_KEY, '1');
    else sessionStorage.removeItem(AUTH_KEY);
  }
  function showLogin(){
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('app').classList.remove('visible');
  }
  function showApp(){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    initApp();
  }

  document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const pw = document.getElementById('pw').value;
    const err = document.getElementById('loginError');
    if(pw === PASSWORD){
      setAuthed(true);
      err.textContent = '';
      showApp();
    } else {
      err.textContent = 'Incorrect password. Try again.';
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  });

  document.getElementById('pwToggle').addEventListener('click', () => {
    const input = document.getElementById('pw');
    input.type = input.type === 'password' ? 'text' : 'password';
    input.focus();
  });

  document.getElementById('signOut').addEventListener('click', () => {
    setAuthed(false);
    showLogin();
    document.getElementById('pw').value = '';
  });

  let DATA, SCHEDULE, META;
  const state = {
    view: 'week',
    weekStart: null,
    dayIndex: null,
    status: {},
    initialized: false,
  };

  function loadStatus(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw) return JSON.parse(raw);
    }catch(e){}
    return {};
  }
  function saveStatus(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state.status)); }catch(e){}
  }
  function getKey(dateStr, platform){ return `${dateStr}:${platform}`; }
  function isPosted(dateStr, platform){ return !!state.status[getKey(dateStr, platform)]; }
  function setPosted(dateStr, platform, val){
    const k = getKey(dateStr, platform);
    if(val) state.status[k] = true; else delete state.status[k];
    saveStatus();
    updateProgress();
  }

  function parseDate(str){
    const [y, m, d] = str.split('-').map(Number);
    return new Date(y, m-1, d);
  }
  function fmtDateStr(date){
    const y = date.getFullYear();
    const m = String(date.getMonth()+1).padStart(2,'0');
    const d = String(date.getDate()).padStart(2,'0');
    return `${y}-${m}-${d}`;
  }
  function startOfWeek(date){
    const d = new Date(date);
    const dow = d.getDay();
    const offset = dow === 0 ? -6 : 1 - dow;
    d.setDate(d.getDate() + offset);
    d.setHours(0,0,0,0);
    return d;
  }
  function fmtWeekLabel(monday){
    const end = new Date(monday); end.setDate(end.getDate() + 6);
    const opt = { month: 'short', day: 'numeric' };
    return `${monday.toLocaleDateString('en-US', opt)} — ${end.toLocaleDateString('en-US', opt)}, ${end.getFullYear()}`;
  }
  function getEntryByDate(dateStr){
    return SCHEDULE.find(s => s.date === dateStr);
  }
  function daysOfWeek(monday){
    const out = [];
    for(let i=0;i<7;i++){
      const d = new Date(monday); d.setDate(monday.getDate()+i);
      out.push(d);
    }
    return out;
  }

  function updateProgress(){
    const totalSlots = SCHEDULE.filter(s => !s.rest).length * 3;
    const done = Object.keys(state.status).length;
    const pct = totalSlots ? Math.round((done / totalSlots) * 100) : 0;
    document.getElementById('progressLabel').textContent = `${done} / ${totalSlots} posted`;
    document.getElementById('progressFill').style.width = pct + '%';
  }

  function render(){
    if(state.view === 'week') renderWeek();
    else renderDay();
    syncNav();
    updateProgress();
  }

  function syncNav(){
    document.querySelectorAll('.view-toggle button').forEach(b=>{
      b.classList.toggle('active', b.dataset.view === state.view);
    });
    if(state.view === 'week'){
      document.getElementById('weekNav').style.visibility = 'visible';
      document.getElementById('weekLabel').textContent = fmtWeekLabel(state.weekStart);
    } else {
      document.getElementById('weekNav').style.visibility = 'hidden';
    }
  }

  const main = () => document.getElementById('main');

  function renderWeek(){
    const days = daysOfWeek(state.weekStart);
    const todayStr = fmtDateStr(new Date());

    const grid = document.createElement('div');
    grid.className = 'week-grid';

    days.forEach(d => {
      const ds = fmtDateStr(d);
      const entry = getEntryByDate(ds);
      const card = document.createElement('div');
      card.className = 'day-card';

      if(!entry){
        card.classList.add('rest');
        card.innerHTML = `
          <div class="day-header">
            <div class="day-date">${d.getDate()}<small>${d.toLocaleDateString('en-US',{weekday:'short'})}</small></div>
          </div>
          <div class="rest-label">—</div>
        `;
      } else if(entry.rest){
        card.classList.add('rest');
        card.innerHTML = `
          <div class="day-header">
            <div class="day-date">${d.getDate()}<small>${entry.weekday_short}</small></div>
          </div>
          <div class="rest-label">Rest day</div>
        `;
      } else {
        card.dataset.app = entry.app;
        if(ds === todayStr) card.classList.add('today');
        const statusHTML = ['x','threads','instagram'].map(p => {
          const done = isPosted(entry.date, p);
          const lbl = p === 'x' ? 'X' : p === 'threads' ? 'T' : 'I';
          return `<div class="status-chip ${done ? 'done' : ''}">${done ? '✓' : '○'} ${lbl}</div>`;
        }).join('');
        card.innerHTML = `
          <div class="day-header">
            <div class="day-date">${d.getDate()}<small>${entry.weekday_short}</small></div>
            <span class="day-app-badge" data-app="${entry.app}">${entry.app_name}</span>
          </div>
          <div class="day-theme">${escapeHTML(entry.theme)}</div>
          <div class="day-status-row">${statusHTML}</div>
        `;
        card.addEventListener('click', () => openDay(entry.date));
      }

      grid.appendChild(card);
    });

    main().innerHTML = '';
    main().appendChild(grid);
  }

  function renderDay(){
    const idx = state.dayIndex;
    const entry = SCHEDULE[idx];
    const wrap = document.createElement('div');
    wrap.className = 'day-view';

    const d = parseDate(entry.date);
    const dateLong = d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });

    const backBtn = document.createElement('button');
    backBtn.className = 'back-link';
    backBtn.innerHTML = '← Back to week';
    backBtn.addEventListener('click', () => { state.view = 'week'; render(); });
    wrap.appendChild(backBtn);

    if(entry.rest){
      wrap.innerHTML += `
        <div class="day-view-header">
          <h1 class="day-view-title">${dateLong}</h1>
          <div class="day-view-meta"><strong>Day ${entry.day_index}</strong> of 180<br>Rest day — no post scheduled</div>
        </div>
        <div class="rest-card">
          <h2>Take Sunday off.</h2>
          <p>The algorithm will survive.</p>
        </div>
      `;
      main().innerHTML = '';
      main().appendChild(wrap);
      attachDayFooter(wrap, idx);
      return;
    }

    const appColorVar = entry.app === 'authorlify' ? 'var(--app-authorlify)'
      : entry.app === 'edithority' ? 'var(--app-edithority)'
      : 'var(--app-check)';

    const header = document.createElement('div');
    header.className = 'day-view-header';
    header.innerHTML = `
      <h1 class="day-view-title">
        ${d.toLocaleDateString('en-US', { month:'long', day:'numeric' })}
        <span class="app-tag" style="background:${appColorVar}">${entry.app_name}</span>
      </h1>
      <div class="day-view-meta">
        <strong>Day ${entry.day_index}</strong> of 180<br>
        ${entry.weekday} · Theme: ${escapeHTML(entry.theme)}
      </div>
    `;
    wrap.appendChild(header);

    const stack = document.createElement('div');
    stack.className = 'platform-stack';

    const platforms = [
      { key:'x', name:'X (Twitter)', letter:'X' },
      { key:'threads', name:'Threads', letter:'T' },
      { key:'instagram', name:'Instagram', letter:'I' },
    ];

    platforms.forEach(p => {
      const text = entry.posts[p.key];
      const done = isPosted(entry.date, p.key);
      const charCount = text.length;
      const card = document.createElement('article');
      card.className = 'platform-card';
      card.innerHTML = `
        <div class="platform-head">
          <div class="platform-name"><span class="letter">${p.letter}</span> ${p.name}</div>
          <div class="platform-char-count">${charCount} chars</div>
        </div>
        <div class="platform-body">
          <p class="post-text">${escapeHTML(text)}</p>
          <div class="platform-actions">
            <button class="btn primary copy-btn" data-platform="${p.key}">
              <span class="copy-label">Copy to clipboard</span>
            </button>
            <button class="btn status-btn ${done ? 'done' : ''}" data-platform="${p.key}">
              ${done ? '✓ Posted' : '○ Mark as posted'}
            </button>
          </div>
        </div>
      `;

      card.querySelector('.copy-btn').addEventListener('click', async (e) => {
        const btn = e.currentTarget;
        const label = btn.querySelector('.copy-label');
        try{
          await navigator.clipboard.writeText(text);
          const orig = label.textContent;
          btn.classList.add('copied');
          label.textContent = '✓ Copied';
          setTimeout(()=>{ btn.classList.remove('copied'); label.textContent = orig; }, 1500);
        }catch(err){
          alert('Could not copy — please select and copy manually.');
        }
      });

      card.querySelector('.status-btn').addEventListener('click', (e) => {
        const btn = e.currentTarget;
        const newVal = !isPosted(entry.date, p.key);
        setPosted(entry.date, p.key, newVal);
        btn.classList.toggle('done', newVal);
        btn.textContent = newVal ? '✓ Posted' : '○ Mark as posted';
      });

      stack.appendChild(card);
    });

    wrap.appendChild(stack);
    attachDayFooter(wrap, idx);

    main().innerHTML = '';
    main().appendChild(wrap);
  }

  function attachDayFooter(wrap, idx){
    const footer = document.createElement('div');
    footer.className = 'day-view-footer';
    const prev = document.createElement('button');
    prev.className = 'btn'; prev.textContent = '← Previous day';
    prev.disabled = idx === 0;
    if(idx === 0) prev.style.opacity = 0.4;
    prev.addEventListener('click', () => { if(idx>0){ state.dayIndex = idx-1; render(); }});
    const next = document.createElement('button');
    next.className = 'btn'; next.textContent = 'Next day →';
    next.disabled = idx >= SCHEDULE.length - 1;
    if(idx >= SCHEDULE.length - 1) next.style.opacity = 0.4;
    next.addEventListener('click', () => { if(idx < SCHEDULE.length -1){ state.dayIndex = idx+1; render(); }});
    footer.appendChild(prev); footer.appendChild(next);
    wrap.appendChild(footer);
  }

  function openDay(dateStr){
    const idx = SCHEDULE.findIndex(s => s.date === dateStr);
    if(idx < 0) return;
    state.dayIndex = idx;
    state.view = 'day';
    render();
  }

  function escapeHTML(s){
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  function initApp(){
    if(state.initialized) return;
    state.initialized = true;

    DATA = JSON.parse(document.getElementById('scheduleData').textContent);
    SCHEDULE = DATA.schedule;
    META = DATA.meta;
    state.status = loadStatus();

    const today = new Date(); today.setHours(0,0,0,0);
    const startDay = parseDate(META.start_date);
    const initialDate = today < startDay ? startDay : today;
    state.weekStart = startOfWeek(initialDate);

    document.querySelectorAll('.view-toggle button').forEach(b=>{
      b.addEventListener('click', ()=>{
        state.view = b.dataset.view;
        if(state.view === 'day' && state.dayIndex === null){
          const todayStr = fmtDateStr(new Date());
          const idx = SCHEDULE.findIndex(s => s.date === todayStr);
          state.dayIndex = idx >= 0 ? idx : 0;
        }
        render();
      });
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
      const d = new Date(state.weekStart); d.setDate(d.getDate() - 7);
      state.weekStart = d; render();
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
      const d = new Date(state.weekStart); d.setDate(d.getDate() + 7);
      state.weekStart = d; render();
    });
    document.getElementById('todayBtn').addEventListener('click', () => {
      state.weekStart = startOfWeek(new Date());
      state.view = 'week';
      render();
    });

    render();
  }

  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(()=>{});
    });
  }

  if(isAuthed()) showApp(); else showLogin();
})();
</script>
</body>
</html>
